name: my_portfolio
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  lucide_icons_flutter: ^3.1.9
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  flutter_inner_shadow: ^0.0.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/image/projects/
    - assets/image/self/
    - assets/image/svg_icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
  
  
  
